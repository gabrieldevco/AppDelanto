version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: appdelanta_db
    environment:
      POSTGRES_DB: appdelanta
      POSTGRES_USER: mydatabaseuser
      POSTGRES_PASSWORD: mydatabasepassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mydatabaseuser -d appdelanta"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: appdelanta_backend
    command: >
      sh -c "python manage.py makemigrations users companies advances notifications &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: 'True'
      DATABASE_URL: postgres://mydatabaseuser:mydatabasepassword@db:5432/appdelanta
      DB_NAME: appdelanta
      DB_USER: mydatabaseuser
      DB_PASSWORD: mydatabasepassword
      DB_HOST: db
      DB_PORT: 5432
      SECRET_KEY: django-insecure-dev-key-change-in-production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
